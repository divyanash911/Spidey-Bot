name: spidey-watch

# Runs on GitHub's servers every 5 minutes. Nothing runs on your laptop.
# NOTE: keep this repo PUBLIC so Actions minutes are unlimited and free.
# (Private repos only get 2000 free minutes/month, which this would exceed.)
on:
  schedule:
    - cron: "0 */6 * * *"   
  workflow_dispatch: {}      # lets you trigger a run manually from the UI

permissions:
  contents: write            # needed to commit state.json back

concurrency:
  group: spidey-watch
  cancel-in-progress: false  # never kill a run mid-scan

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      # --- not secret: edit these directly ---
      EVENT_CODE: "ET00447840"   # <-- set your event code
      MOVIE_PAGE_URL: "https://in.bookmyshow.com/explore/movies-hyderabad"
      HOME_LAT: "17.4400"
      HOME_LON: "78.3489"
      PRIORITY_RADIUS_KM: "8"
      DAYS_AHEAD: "7"
      # --- secret: set these in Settings -> Secrets and variables -> Actions ---
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Scan once
        run: python agent.py --once

      - name: Persist state
        if: always()
        run: |
          [ -f state.json ] || exit 0
          git add state.json
          git diff --cached --quiet && exit 0   # nothing changed, skip commit
          git config user.name "spidey-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "update state [skip ci]"
          git push
